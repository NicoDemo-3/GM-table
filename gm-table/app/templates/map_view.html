<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map &mdash; {{ campaign.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    html,body{margin:0;height:100%;background:#000;overflow:hidden}
    #wrap{height:100vh;display:grid;place-items:center}
    .map-stage{max-width:100vw;max-height:100vh}
    canvas{max-width:100vw;max-height:100vh;display:block}
    #wait{color:#9a917a;font-family:system-ui,sans-serif;text-align:center}
  </style>
</head>
<body>
<div id="wrap">
  <div id="wait">Waiting for the DM to share a map&hellip;</div>
  <div id="stage" class="map-stage" style="display:none">
    <canvas id="map"></canvas>
    <div id="tokens" class="token-layer"></div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const cid="{{ campaign.id }}"; const socket=io();
let M={{ mapdata | tojson }}; M.tokens=M.tokens||[];
const stage=document.getElementById('stage'), cv=document.getElementById('map'), ctx=cv.getContext('2d'),
      layer=document.getElementById('tokens'), wait=document.getElementById('wait');
let img=null;
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
socket.on('connect',()=>socket.emit('join',{campaignId:cid}));
function load(){
  if(!M.image){ stage.style.display='none'; wait.style.display='block'; return; }
  img=new Image(); img.onload=()=>{ cv.width=img.naturalWidth; cv.height=img.naturalHeight; stage.style.display='inline-block'; wait.style.display='none'; draw(); tokens(); }; img.src=M.image;
}
function draw(){
  if(!img) return; ctx.clearRect(0,0,cv.width,cv.height); ctx.drawImage(img,0,0);
  const f=M.fog||{}, cell=f.cell||48, op=(M.playerOpacity!=null?M.playerOpacity:1);
  if(f.cols){ const rev=new Set(f.revealed||[]); ctx.fillStyle='rgba(0,0,0,'+op+')';
    for(let y=0;y<f.rows;y++)for(let x=0;x<f.cols;x++){ if(!rev.has(y*f.cols+x)) ctx.fillRect(x*cell,y*cell,cell,cell);} }
}
function tokens(){
  if(!img) return; const iw=img.naturalWidth, ih=img.naturalHeight;
  layer.innerHTML=(M.tokens||[]).map(t=>{
    const inner=t.image?`<img src="${t.image}" alt="">`:`<span class="tok-init">${esc((t.label||'?').slice(0,2))}</span>`;
    return `<div class="token shape-${t.shape||'circle'}" style="left:${t.x/iw*100}%;top:${t.y/ih*100}%;width:${t.size/iw*100}%;--tc:${t.color||'#7d2230'}">${inner}<span class="tok-label">${esc(t.label||'')}</span></div>`;
  }).join('');
}
socket.on('map:image',m=>{ M.image=m.image; M.fog=m.fog; load(); });
socket.on('map:fog',m=>{ M.fog=m.fog; draw(); });
socket.on('map:opacity',m=>{ M.playerOpacity=m.playerOpacity; draw(); });
socket.on('map:tokens',m=>{ M.tokens=m.tokens||[]; tokens(); });
load();
</script>
</body></html>
